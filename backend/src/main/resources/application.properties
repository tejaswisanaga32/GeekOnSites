spring.application.name=call-management

# MySQL Configuration - Production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/geekonsites_db}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:geekonsiteSecretKey2024ForCallManagementSystem}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration - Production
cors.allowed-origins=https://geekonsites-frontend.onrender.com,https://geekonsites-backend.onrender.com

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
