<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Login - GeekOnSite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(26,26,26,0.9)), url('images/homepage display 1.jpeg') center/cover no-repeat;
            padding: 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .login-box {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.98), rgba(20, 20, 20, 0.95));
            border: 2px solid var(--secondary-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        
        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary-color), #fff, var(--secondary-color));
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            color: var(--secondary-color);
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }
        
        .login-header p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-group label {
            display: block;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        
        .form-group i {
            position: absolute;
            left: 1rem;
            top: 2.8rem;
            color: var(--secondary-color);
            font-size: 1.1rem;
        }
        
        .btn-login {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--secondary-color), #b8941f);
            color: var(--black);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e6b847, var(--secondary-color));
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .portal-links {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .portal-links h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .portal-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        
        .portal-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .portal-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--secondary-color);
            color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }
        
        .portal-btn i {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }
        
        .portal-btn span {
            flex: 1;
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }
        
        .forgot-password a {
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .forgot-password a:hover {
            color: #b8941f;
            text-decoration: underline;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        
        .alert.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        
        .alert.error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        /* Portal Navbar Styles */
        .portal-navbar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            margin-top: 1rem;
        }
        
        .nav-section {
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        
        .nav-section.portal-section {
            flex: 2;
            min-width: 300px;
        }
        
        .nav-title {
            display: block;
            color: var(--secondary-color);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        .portal-subsection {
            margin-bottom: 0.8rem;
        }
        
        .portal-subtitle {
            display: block;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }
        
        .portal-sublinks {
            display: flex;
            gap: 0.3rem;
            justify-content: center;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
            flex: 1;
        }
        
        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--secondary-color);
            color: var(--secondary-color);
            transform: translateY(-1px);
        }
        
        .nav-link.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--secondary-color);
            color: var(--secondary-color);
            font-weight: 600;
        }
        
        .nav-link.admin-link {
            background: rgba(244, 67, 54, 0.1);
            border-color: #f44336;
            color: #f44336;
        }
        
        .nav-link.admin-link:hover {
            background: rgba(244, 67, 54, 0.2);
            border-color: #ef5350;
            color: #ef5350;
        }
        
        .nav-link.home-link {
            background: rgba(76, 175, 80, 0.1);
            border-color: #4caf50;
            color: #4caf50;
        }
        
        .nav-link.home-link:hover {
            background: rgba(76, 175, 80, 0.2);
            border-color: #66bb6a;
            color: #66bb6a;
        }
        
        .nav-link i {
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .login-box {
                padding: 2rem;
                margin: 1rem;
            }
            
            .portal-navbar {
                flex-direction: column;
                gap: 0.8rem;
            }
            
            .nav-section {
                min-width: auto;
            }
            
            .nav-section.portal-section {
                min-width: auto;
            }
            
            .portal-sublinks {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-tools"></i> Technician Login</h1>
                <p>Access your technician dashboard and service assignments</p>
            </div>
            
            <div id="alertBox" class="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" required 
                           placeholder="your.email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login to Account
                </button>
                
                <div class="forgot-password">
                    <a href="#" onclick="handleForgotPassword()">Forgot your password?</a>
                </div>
            </form>
            
            <div class="portal-links">
                <h3><i class="fas fa-portal-enter"></i> Portal Navigation</h3>
                
                <!-- Navigation Bar -->
                <nav class="portal-navbar">
                    <div class="nav-section">
                        <a href="admin-login.html" class="nav-link admin-link">
                            <i class="fas fa-user-shield"></i> Admin
                        </a>
                    </div>
                    
                    <div class="nav-section portal-section">
                        <span class="nav-title">Portal</span>
                        <div class="nav-links">
                            <div class="portal-subsection">
                                <span class="portal-subtitle">Customer</span>
                                <div class="portal-sublinks">
                                    <a href="customer-register.html" class="nav-link">
                                        <i class="fas fa-user-plus"></i> Register
                                    </a>
                                    <a href="customer-login.html" class="nav-link">
                                        <i class="fas fa-sign-in-alt"></i> Login
                                    </a>
                                </div>
                            </div>
                            
                            <div class="portal-subsection">
                                <span class="portal-subtitle">Technician</span>
                                <div class="portal-sublinks">
                                    <a href="technician-register.html" class="nav-link">
                                        <i class="fas fa-user-plus"></i> Register
                                    </a>
                                    <a href="technician-login.html" class="nav-link active">
                                        <i class="fas fa-sign-in-alt"></i> Login
                                    </a>
                                </div>
                            </div>
                            
                            <div class="portal-subsection">
                                <span class="portal-subtitle">Agent</span>
                                <div class="portal-sublinks">
                                    <a href="agent-register-enhanced.html" class="nav-link">
                                        <i class="fas fa-user-plus"></i> Register
                                    </a>
                                    <a href="agent-login.html" class="nav-link">
                                        <i class="fas fa-sign-in-alt"></i> Login
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nav-section">
                        <a href="index.html" class="nav-link home-link">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </div>
                </nav>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert ${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
        
        function handleForgotPassword() {
            showAlert('Password reset functionality will be available soon', 'success');
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        role: 'TECHNICIAN'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'technician-dashboard.html';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Account';
            }
        });
    </script>
</body>
</html>
