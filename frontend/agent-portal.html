<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Portal - GeekOnSite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-gold: #b8941f;
            --light-gold: #f4e5bc;
            --black: #000000;
            --dark-gray: #1a1a1a;
            --medium-gray: #333333;
            --light-gray: #f5f5f5;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark-gray) 100%);
            min-height: 100vh;
            color: var(--white);
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(26, 26, 26, 0.95);
            border-right: 2px solid var(--primary-gold);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--medium-gray);
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-gold);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .agent-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(51, 51, 51, 0.5);
            border-radius: 10px;
            border: 1px solid var(--primary-gold);
        }

        .agent-avatar {
            font-size: 3rem;
            color: var(--primary-gold);
            margin-bottom: 15px;
        }

        .agent-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            margin-bottom: 5px;
        }

        .agent-id {
            color: var(--light-gold);
            font-size: 0.9rem;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: block;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: rgba(51, 51, 51, 0.3);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--light-gray);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--primary-gold);
            color: var(--primary-gold);
        }

        .nav-item i {
            margin-right: 10px;
            width: 20px;
        }

        .logout-btn {
            padding: 15px 20px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            border-radius: 8px;
            color: #f44336;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .content-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: var(--light-gray);
            font-size: 1rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(26, 26, 26, 0.95);
            border: 2px solid var(--medium-gray);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary-gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .stat-card.pending .stat-icon {
            color: #ff9800;
        }

        .stat-card.progress .stat-icon {
            color: #2196f3;
        }

        .stat-card.completed .stat-icon {
            color: #4caf50;
        }

        .stat-card.total .stat-icon {
            color: var(--primary-gold);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--white);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--light-gray);
            font-size: 1rem;
        }

        /* Ticket Lists */
        .tickets-section {
            background: rgba(26, 26, 26, 0.95);
            border: 2px solid var(--medium-gray);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--medium-gray);
        }

        .section-title {
            font-size: 1.5rem;
            color: var(--primary-gold);
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
        }

        .badge {
            background: var(--primary-gold);
            color: var(--black);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .ticket-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .ticket-item {
            background: rgba(51, 51, 51, 0.5);
            border: 1px solid var(--medium-gray);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .ticket-item:hover {
            border-color: var(--primary-gold);
            transform: translateX(5px);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .ticket-info h4 {
            color: var(--primary-gold);
            margin-bottom: 5px;
        }

        .ticket-info p {
            color: var(--light-gray);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .ticket-meta {
            color: var(--light-gray);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .ticket-priority {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .priority-medium {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .priority-low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-start {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
            border: 1px solid #2196f3;
        }

        .btn-start:hover {
            background: rgba(33, 150, 243, 0.3);
        }

        .btn-complete {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .btn-complete:hover {
            background: rgba(76, 175, 80, 0.3);
        }

        .btn-view {
            background: rgba(212, 175, 55, 0.2);
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
        }

        .btn-view:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--light-gray);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--medium-gray);
            margin-bottom: 15px;
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 2000;
            display: none;
            min-width: 300px;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.9);
            border: 1px solid #4caf50;
            color: white;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.9);
            border: 1px solid #f44336;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
            }

            .main-content {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-headset"></i> GeekOnSite
                </div>
            </div>

            <div class="agent-info">
                <div class="agent-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="agent-name" id="agentName">Loading...</div>
                <div class="agent-id" id="agentId">Loading...</div>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" onclick="showSection('dashboard')">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#" class="nav-item" onclick="showSection('pending')">
                    <i class="fas fa-clock"></i> Pending Tickets
                </a>
                <a href="#" class="nav-item" onclick="showSection('progress')">
                    <i class="fas fa-spinner"></i> In Progress
                </a>
                <a href="#" class="nav-item" onclick="showSection('completed')">
                    <i class="fas fa-check-circle"></i> Completed
                </a>
            </nav>

            <a href="#" class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1 class="page-title">Agent Portal</h1>
                <p class="page-subtitle">Manage your assigned support tickets</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card pending">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">Pending Tickets</div>
                </div>

                <div class="stat-card progress">
                    <div class="stat-icon">
                        <i class="fas fa-spinner"></i>
                    </div>
                    <div class="stat-number" id="progressCount">0</div>
                    <div class="stat-label">In Progress</div>
                </div>

                <div class="stat-card completed">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Completed</div>
                </div>

                <div class="stat-card total">
                    <div class="stat-icon">
                        <i class="fas fa-ticket-alt"></i>
                    </div>
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total Assigned</div>
                </div>
            </div>

            <!-- All Tickets Section -->
            <div class="tickets-section" id="allTicketsSection">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i> All Assigned Tickets
                    </h2>
                    <span class="badge" id="totalBadge">0</span>
                </div>
                <div class="ticket-list" id="allTicketsList">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Loading tickets...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <script>
        const API_BASE_URL = 'https://geekonsite-2.onrender.com/api';
        let agentInfo = {};
        let currentToken = '';
        let allTickets = [];

        // Initialize dashboard
        window.addEventListener('load', () => {
            const token = localStorage.getItem('agentToken');
            const info = localStorage.getItem('agentInfo');
            
            if (!token || !info) {
                window.location.href = 'agent-login.html';
                return;
            }
            
            currentToken = token;
            agentInfo = JSON.parse(info);
            
            // Set agent info
            document.getElementById('agentName').textContent = 
                agentInfo.agent.firstName + ' ' + agentInfo.agent.lastName || 'Unknown Agent';
            document.getElementById('agentId').textContent = agentInfo.agent.agentId || 'Unknown ID';
            
            console.log('Agent Portal - Agent Info:', agentInfo);
            console.log('Agent Portal - Agent ID:', agentInfo.agent.agentId);
            console.log('Agent Portal - Agent Full Name:', agentInfo.agent.firstName + ' ' + agentInfo.agent.lastName);
            
            // Load dashboard
            loadDashboard();
        });

        async function loadDashboard() {
            try {
                console.log('Agent Portal - Loading dashboard with public tickets endpoint...');
                
                // Use the working public tickets endpoint
                const response = await fetch(`${API_BASE_URL}/public/tickets?v=${Date.now()}`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                console.log('Agent Portal - Response:', data);
                
                if (data.success) {
                    allTickets = data.data || [];
                    console.log('Agent Portal - All tickets loaded:', allTickets.length);
                    
                    // Filter tickets assigned to this agent
                    const agentId = agentInfo.agent.agentId;
                    const assignedTickets = allTickets.filter(ticket => ticket.assignedTo === agentId);
                    
                    console.log('Agent Portal - Assigned tickets for agent', agentId, ':', assignedTickets.length);
                    
                    updateDashboard(assignedTickets);
                } else {
                    console.error('Agent Portal - Failed to load tickets:', data.message);
                    showAlert(data.message || 'Failed to load dashboard', 'error');
                }
            } catch (error) {
                console.error('Agent Portal - Network error:', error);
                showAlert('Network error. Please refresh.', 'error');
            }
        }

        function updateDashboard(tickets) {
            // Calculate stats
            const pendingTickets = tickets.filter(t => t.status === 'OPEN');
            const inProgressTickets = tickets.filter(t => t.status === 'IN_PROGRESS');
            const completedTickets = tickets.filter(t => t.status === 'RESOLVED' || t.status === 'CLOSED');
            
            // Update stats
            document.getElementById('pendingCount').textContent = pendingTickets.length;
            document.getElementById('progressCount').textContent = inProgressTickets.length;
            document.getElementById('completedCount').textContent = completedTickets.length;
            document.getElementById('totalCount').textContent = tickets.length;
            document.getElementById('totalBadge').textContent = tickets.length;
            
            // Render all tickets
            renderTicketsList('allTicketsList', tickets);
            
            console.log('Agent Portal - Dashboard updated:', {
                pending: pendingTickets.length,
                inProgress: inProgressTickets.length,
                completed: completedTickets.length,
                total: tickets.length
            });
        }

        function renderTicketsList(containerId, tickets) {
            const container = document.getElementById(containerId);
            
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No tickets assigned to you</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tickets.map(ticket => `
                <div class="ticket-item">
                    <div class="ticket-header">
                        <div class="ticket-info">
                            <h4>${ticket.customerName || 'Unknown Customer'}</h4>
                            <p>${ticket.customerPhone || 'No phone'} | ${ticket.issueDescription || 'No description'}</p>
                            <div class="ticket-meta">
                                Ticket #${ticket.ticketNumber} | Status: ${ticket.status} | Assigned: ${ticket.assignedToName || 'N/A'}
                            </div>
                        </div>
                        <span class="ticket-priority priority-${(ticket.category || 'medium').toLowerCase()}">
                            ${ticket.category || 'GENERAL'}
                        </span>
                    </div>
                    <div class="ticket-actions">
                        ${ticket.status === 'OPEN' ? `
                            <button class="btn-action btn-start" onclick="startTicket('${ticket.ticketNumber}')">
                                <i class="fas fa-play"></i> Start
                            </button>
                        ` : ''}
                        ${ticket.status === 'IN_PROGRESS' ? `
                            <button class="btn-action btn-complete" onclick="completeTicket('${ticket.ticketNumber}')">
                                <i class="fas fa-check"></i> Complete
                            </button>
                        ` : ''}
                        <button class="btn-action btn-view" onclick="viewTicket('${ticket.ticketNumber}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function startTicket(ticketNumber) {
            try {
                const response = await fetch(`${API_BASE_URL}/public/tickets/${ticketNumber}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ 
                        status: 'IN_PROGRESS', 
                        notes: 'Started working on ticket' 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Ticket started successfully', 'success');
                    loadDashboard();
                } else {
                    showAlert(data.message || 'Failed to start ticket', 'error');
                }
            } catch (error) {
                showAlert('Network error', 'error');
            }
        }

        async function completeTicket(ticketNumber) {
            try {
                const response = await fetch(`${API_BASE_URL}/public/tickets/${ticketNumber}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ 
                        status: 'RESOLVED', 
                        notes: 'Ticket completed successfully' 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Ticket completed successfully', 'success');
                    loadDashboard();
                } else {
                    showAlert(data.message || 'Failed to complete ticket', 'error');
                }
            } catch (error) {
                showAlert('Network error', 'error');
            }
        }

        function viewTicket(ticketNumber) {
            const ticket = allTickets.find(t => t.ticketNumber === ticketNumber);
            if (ticket) {
                alert(`Ticket Details:\n\nNumber: ${ticket.ticketNumber}\nCustomer: ${ticket.customerName}\nPhone: ${ticket.customerPhone}\nIssue: ${ticket.issueDescription}\nStatus: ${ticket.status}\nAssigned to: ${ticket.assignedToName || 'N/A'}`);
            }
        }

        function showSection(section) {
            // Update nav active state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // For now, show all tickets for all sections
            // This can be enhanced later to filter by status
        }

        function logout() {
            localStorage.removeItem('agentToken');
            localStorage.removeItem('agentInfo');
            window.location.href = 'agent-login.html';
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
